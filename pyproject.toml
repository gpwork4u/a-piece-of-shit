[project.urls]
Homepage = 'https://github.com/someone/a-piece-of-shit'
Issues = 'https://github.com/someone/a-piece-of-shit/issues'

[tool.setuptools.packages.find]
where = ['src']

[tool.ruff]
line-length = 88
target-version = 'py39'

[tool.ruff.format]
quote-style = 'single'

[tool.ruff.lint]
select = ['E4', 'E7', 'E9', 'F']
fixable = ['ALL']

[tool.pytest.ini_options]
testpaths = ['tests']

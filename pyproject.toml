    'grpcio',
    'tomli',
    'awscli',
    'virtualenv',
    'frozenlist',
    'propcache',
    'googleapis-common-protos',
    'requests-oauthlib',
    'rpds-py',
    'markdown-it-py',
    'referencing',
    'aiosignal',
    'wrapt',
    'greenlet',
    'pillow',
    'pyasn1-modules',
    'sqlalchemy',
    'mdurl',
    'scipy',
    'jsonschema-specifications',
    'pyarrow',
    'trove-classifiers',
    'uvicorn',
    'aiohappyeyeballs',
    'starlette',
    'oauthlib',
    'psutil',
    'pyparsing',
    'fastapi',
    'google-genai',
    'cachetools',

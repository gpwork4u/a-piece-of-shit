[build-system]
requires = ['setuptools>=68.0', 'wheel']
build-backend = 'setuptools.backends._legacy:_Backend'

[project]
name = 'a-piece-of-shit'
version = '0.1.0'
description = 'A utterly useless package that imports everything for you.'
readme = 'README.md'
license = {text = 'WTFPL'}
requires-python = '>=3.9'
authors = [
    {name = 'Some Idiot'},
]
classifiers = [
    'Development Status :: 1 - Planning',
    'Intended Audience :: Nobody',
    'License :: Other/Proprietary License',
    'Programming Language :: Python :: 3',
    'Topic :: Software Development :: Libraries :: Python Modules',
    'Topic :: Utilities',
]
dependencies = [
    # ===== PyPI Top 100 (by 30-day downloads) =====
    'boto3',
    'packaging',
    'urllib3',
    'setuptools',
    'certifi',
    'requests',
    'typing-extensions',
    'botocore',
    'idna',
    'charset-normalizer',
    'aiobotocore',
    'python-dateutil',
    'six',
    'cryptography',
    'grpcio-status',
    'cffi',
    'numpy',
    'pyyaml',
    's3transfer',
    'pycparser',
    'pluggy',
    'pydantic',
    'pygments',
    's3fs',
    'fsspec',
    'click',
    'protobuf',
    'pandas',
    'attrs',
    'pydantic-core',
    'pytest',
    'anyio',
    'markupsafe',
    'h11',
    'iniconfig',
    'platformdirs',
    'jmespath',
    'annotated-types',
    'filelock',
    'jinja2',
    'importlib-metadata',
    'pathspec',
    'pyjwt',
    'rsa',
    'httpx',
    'zipp',
    'pytz',
    'httpcore',
    'typing-inspection',
    'pyasn1',
